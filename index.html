<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apa nak makan tonight?</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    h1 {
      font-size: 3.5rem;
      text-shadow: 3px 3px 0px #ff6b6b;
      margin-bottom: 2rem;
      padding: 0 1rem;
      line-height: 1.2;
    }
    button {
      background: #ff6b6b;
      color: white;
      border: 4px solid #fff;
      padding: 1rem 2rem;
      font-size: 1.8rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 0px #c44d4d;
      transition: all 0.1s;
      font-weight: bold;
    }
    button:active {
      transform: translateY(8px);
      box-shadow: 0 0px 0px #c44d4d;
    }
    #result {
      margin-top: 3rem;
      font-size: 3.5rem;
      font-weight: bold;
      color: #ffe66d;
      text-shadow: 2px 2px 0px #ff6b6b;
      min-height: 80px;
    }
    .pop {
      animation: pop-anim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop-anim {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Apa nak makan tonight? 😋</h1>
  <button id="pilih-btn" onclick="pilihMakanan()">Pilih untuk saya!</button>
  <div id="result"></div>

  <script>
    const dishes = [
      { name: 'Nasi Lemak', emoji: '🥥🍚' },
      { name: 'Roti Canai', emoji: '🫓🍛' },
      { name: 'Laksa', emoji: '🍜🌶️' },
      { name: 'Satay', emoji: '🍢🥜' },
      { name: 'Mee Goreng', emoji: '🍝🍳' },
      { name: 'Cendol', emoji: '🍧🌴' },
      { name: 'Rendang', emoji: '🥩🔥' },
      { name: 'Teh Tarik', emoji: '☕🧋' },
      { name: 'Mee Rebus', emoji: '🍜🥔' },
      { name: 'Nasi Kerabu', emoji: '🍚💙' }
    ];

    function pilihMakanan() {
      const idx = Math.floor(Math.random() * dishes.length);
      const dish = dishes[idx];
      const resultDiv = document.getElementById('result');
      
      resultDiv.classList.remove('pop');
      void resultDiv.offsetWidth; // trigger reflow
      
      resultDiv.innerHTML = `${dish.emoji} <br/> ${dish.name}!`;
      resultDiv.classList.add('pop');
    }
  </script>
</body>
</html>
